<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MANTECONNI – Jazz Fusion Funk Rock</title>
    <meta name="description" content="Manteconni, banda de Jazz Fusion Funk Rock de Jaén." />
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --teal: #00c4c8; --orange: #ea3d13; --yellow: #f7c91e;
            --pink: #e8276a; --purple: #6b1fa2; --dark: #1a0a2e; --cream: #fdf5e4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--dark);
            color: var(--cream);
            overflow-x: hidden;
        }

        /* Fondo dinámico optimizado */
        body::before {
            content: ''; position: fixed; inset: 0;
            background: 
                radial-gradient(ellipse 60% 40% at 20% 30%, rgba(0,196,200,.1), transparent 70%),
                radial-gradient(ellipse 50% 50% at 80% 70%, rgba(107,31,162,.15), transparent 70%);
            pointer-events: none; z-index: 0;
        }

        /* Header y Navegación */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 100;
            display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center; padding: 0.5rem 2rem;
            background: rgba(26, 10, 46, .92);
            backdrop-filter: blur(14px);
            border-bottom: 2px solid var(--orange);
        }

        .nav-socials { display: flex; gap: 1rem; }
        .nav-social-link {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,.2); border-radius: 6px; color: var(--cream);
            transition: 0.3s;
        }
        .nav-social-link:hover { color: var(--orange); border-color: var(--orange); }

        .brand-img { height: 70px; cursor: pointer; }

        .hamburger { cursor: pointer; display: flex; flex-direction: column; gap: 6px; padding: 10px; }
        .hamburger span { width: 28px; height: 3px; background: var(--cream); transition: 0.3s; }

        /* Estilos de Páginas */
        .page { display: none; padding-top: 100px; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { font-family: 'Righteous', cursive; font-size: 2.5rem; color: var(--yellow); }
        .section-title span { color: var(--orange); }

        /* Grillas optimizadas */
        .grid-base { display: grid; gap: 1.5rem; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
        
        .card {
            background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08);
            border-radius: 12px; padding: 1.5rem; transition: 0.3s;
        }
        .card:hover { border-color: var(--orange); transform: translateY(-5px); }

        @media (max-width: 768px) {
            nav { padding: 0.5rem 1rem; }
            .section-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-socials">
            <a href="#" class="nav-social-link">IG</a>
            <a href="#" class="nav-social-link">FB</a>
        </div>
        <div class="brand" onclick="showPage('inicio')">
            <img src="logo.png" alt="Manteconni" class="brand-img">
        </div>
        <div class="nav-right">
            <div class="hamburger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <main>
        <section id="page-inicio" class="page active">
            <div class="page-inner">
                <h1 class="section-title">MANTE<span>CONNI</span></h1>
                <p>Jazz Fusion Funk Rock desde Jaén.</p>
            </div>
        </section>

        </main>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function toggleMenu() {
            // Lógica para abrir/cerrar el menú móvil
        }
    </script>
</body>
</html>
